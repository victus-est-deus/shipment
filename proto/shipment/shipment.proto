syntax = "proto3";

package shipment;

option go_package = "github.com/victus-est-deus/shipment/proto/shipment";

import "google/protobuf/timestamp.proto";

service ShipmentService {
  rpc CreateShipment(CreateShipmentRequest) returns (CreateShipmentResponse);
  rpc GetShipment(GetShipmentRequest) returns (GetShipmentResponse);
  rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse);
  rpc GetEventHistory(GetEventHistoryRequest) returns (GetEventHistoryResponse);
}

message CreateShipmentRequest {
  string reference_number = 1;
  string origin = 2;
  string destination = 3;
  string driver_name = 4;
  string driver_phone = 5;
  string unit_number = 6;
  double shipment_amount = 7;
  string shipment_currency = 8;
  double driver_revenue = 9;
  string driver_revenue_currency = 10;
}

message CreateShipmentResponse {
  Shipment shipment = 1;
}

message GetShipmentRequest {
  string id = 1;
}

message GetShipmentResponse {
  Shipment shipment = 1;
}

message UpdateStatusRequest {
  string shipment_id = 1;
  string status = 2;
  string location = 3;
  string notes = 4;
}

message UpdateStatusResponse {
  StatusEvent event = 1;
}

message GetEventHistoryRequest {
  string shipment_id = 1;
}

message GetEventHistoryResponse {
  repeated StatusEvent events = 1;
}

message Shipment {
  string id = 1;
  string reference_number = 2;
  string origin = 3;
  string destination = 4;
  string status = 5;
  string driver_name = 6;
  string driver_phone = 7;
  string unit_number = 8;
  double shipment_amount = 9;
  string shipment_currency = 10;
  double driver_revenue = 11;
  string driver_revenue_currency = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message StatusEvent {
  string id = 1;
  string shipment_id = 2;
  string status = 3;
  string location = 4;
  string notes = 5;
  google.protobuf.Timestamp created_at = 6;
}
